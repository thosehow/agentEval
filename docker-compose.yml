services:
  postgres:
    image: postgres:16
    container_name: agenteval-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: agenteval
    ports:
      - "55432:5432"
    volumes:
      - agenteval_pgdata:/var/lib/postgresql/data
      - ./docker/postgres-init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d agenteval"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  agenteval_pgdata:
